services:
  postgres:
    image: postgres:16-alpine
    container_name: service-dependency-postgres
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: service_dependency
      POSTGRES_USER: service_dependency
      POSTGRES_PASSWORD: password
    volumes:
      - ./sql/data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U service_dependency -d service_dependency"]
      interval: 10s
      timeout: 5s
      retries: 10
